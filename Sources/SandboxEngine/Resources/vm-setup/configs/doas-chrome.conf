permit nopass chrome as root cmd poweroff
permit nopass chrome as root cmd warp-cli
permit nopass chrome as root cmd mkdir
permit nopass chrome as root cmd chown
permit nopass chrome as root cmd renice
permit nopass chrome as root cmd udhcpc
permit nopass chrome as root cmd swanctl
# xinitrc clamps the NIC MTU via `doas ip link set … mtu` (see the MTU
# blackhole where large packets die on the vmnet egress path). Without this
# `doas ip` is denied and the clamp silently no-ops, leaving eth0 at 1500.
permit nopass chrome as root cmd ip
