<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!-- Match macOS Core Text font rendering for visual parity with Safari. -->
<fontconfig>

  <!-- Rendering: no hinting (macOS never grid-fits), grayscale AA (Retina). -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>false</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintnone</const></edit>
    <edit name="rgba" mode="assign"><const>none</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcdnone</const></edit>
  </match>

  <!-- Default sans-serif: macOS system fonts -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>SF Pro</family>
      <family>SF Pro Text</family>
      <family>SF Pro Display</family>
      <family>Helvetica Neue</family>
      <family>Helvetica</family>
    </prefer>
  </alias>

  <!-- Default serif: macOS serif fonts -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>New York</family>
      <family>Times New Roman</family>
      <family>Times</family>
    </prefer>
  </alias>

  <!-- Default monospace: macOS monospace fonts -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>SF Mono</family>
      <family>Menlo</family>
      <family>Monaco</family>
    </prefer>
  </alias>

  <!-- CSS system font keywords used by websites (resolve to SF Pro) -->
  <alias>
    <family>-apple-system</family>
    <prefer><family>SF Pro</family></prefer>
  </alias>
  <alias>
    <family>BlinkMacSystemFont</family>
    <prefer><family>SF Pro</family></prefer>
  </alias>
  <alias>
    <family>system-ui</family>
    <prefer><family>SF Pro</family></prefer>
  </alias>
  <alias>
    <family>.AppleSystemUIFont</family>
    <prefer><family>SF Pro</family></prefer>
  </alias>

</fontconfig>
