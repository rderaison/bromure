# Bromure's precision-scroll uinput device carries deltas computed on
# the macOS side, where natural scrolling is already applied by the OS.
# Exempt it from libinput's NaturalScrolling (30-scrolling.conf matches
# all pointers) or every gesture would be double-inverted. Must sort
# BEFORE 30-scrolling.conf: for duplicated InputClass options, Xorg
# keeps the first match.
Section "InputClass"
  Identifier "bromure-precision-scroll"
  MatchProduct "Bromure Precision Scroll"
  Option "NaturalScrolling" "false"
EndSection
